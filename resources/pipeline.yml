resources:
  jobs:
    flood_pipeline:
      name: "[${bundle.target}] Flood Prediction Pipeline - ${var.aoi_name}"
      description: "End-to-end GeoBrix + Spatial SQL flood prediction pipeline for the configured AOI."
      tags:
        demo: "flood-prediction"
        aoi: ${var.aoi_name}

      job_clusters:
        - job_cluster_key: geobrix_cluster
          new_cluster:
            # GeoBrix v0.2.0 targets DBR 17.3; DBR 17.1+ has built-in Spatial SQL.
            spark_version: "17.3.x-scala2.13"
            node_type_id: "Standard_DS3_v2"  # Azure equivalent of ~4 vCPU / 14 GB
            num_workers: 2
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            spark_conf:
              spark.databricks.geo.st.enabled: "true"
            init_scripts:
              # Workspace-file init script fetches GeoBrix JAR + native libs
              # from the public GitHub release at cluster start; no Volume needed.
              - workspace:
                  destination: ${workspace.file_path}/src/bootstrap/geobrix-gdal-init.sh

      tasks:
        - task_key: ingest
          job_cluster_key: geobrix_cluster
          notebook_task:
            notebook_path: ../src/notebooks/01_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${resources.schemas.flood_schema.name}
              aoi_name: ${var.aoi_name}
              aoi_bbox_min_lon: ${var.aoi_bbox_min_lon}
              aoi_bbox_min_lat: ${var.aoi_bbox_min_lat}
              aoi_bbox_max_lon: ${var.aoi_bbox_max_lon}
              aoi_bbox_max_lat: ${var.aoi_bbox_max_lat}
              raw_root: /Volumes/${var.catalog}/${resources.schemas.flood_schema.name}/${var.volume}
          libraries:
            - pypi:
                package: "requests==2.32.3"
            - pypi:
                package: "shapely==2.0.4"

        - task_key: silver
          depends_on:
            - task_key: ingest
          job_cluster_key: geobrix_cluster
          notebook_task:
            notebook_path: ../src/notebooks/02_silver_geobrix.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${resources.schemas.flood_schema.name}
              volume: ${var.volume}
              aoi_name: ${var.aoi_name}
              aoi_bbox_wkt: ${var.aoi_bbox_wkt}
              h3_resolution: ${var.h3_resolution}
          libraries:
            # JAR + GDAL natives come from the init script; wheel is shipped in the bundle.
            - whl: ${workspace.file_path}/src/bootstrap/wheels/geobrix-0.2.0-py3-none-any.whl
            - pypi:
                package: "h3==4.1.0"
            - pypi:
                package: "rasterio==1.3.10"
            - pypi:
                package: "shapely==2.0.4"

        - task_key: gold
          depends_on:
            - task_key: silver
          job_cluster_key: geobrix_cluster
          notebook_task:
            notebook_path: ../src/notebooks/03_gold_features_labels.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${resources.schemas.flood_schema.name}
              aoi_name: ${var.aoi_name}
              h3_resolution: ${var.h3_resolution}
              scenarios_24h_mm: ${var.scenarios_24h_mm}
          libraries:
            - pypi:
                package: "h3==4.1.0"

        - task_key: train_and_score
          depends_on:
            - task_key: gold
          job_cluster_key: geobrix_cluster
          notebook_task:
            notebook_path: ../src/notebooks/04_train_and_score.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${resources.schemas.flood_schema.name}
              aoi_name: ${var.aoi_name}
              model_name: ${var.catalog}.${resources.schemas.flood_schema.name}.${resources.registered_models.flood_rf.name}
              scenarios_24h_mm: ${var.scenarios_24h_mm}
          libraries:
            - pypi:
                package: "mlflow>=2.14.0"
            - pypi:
                package: "h3==4.1.0"
