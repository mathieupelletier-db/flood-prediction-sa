resources:
  apps:
    flood_app:
      name: "flood-prediction-${bundle.target}"
      description: "Interactive flood prediction map for ${var.aoi_name} - GeoBrix + Spatial SQL + Spark ML"
      source_code_path: ../src/app
      resources:
        - name: sql_warehouse
          description: "Warehouse used to serve predictions to the app"
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
